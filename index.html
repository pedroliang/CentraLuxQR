  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"5afb561c-ab40-4125-9b85-d77d608d41e5\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover\">\n<script src=\"7b428f52-3855-43ea-8a65-b049f4cc91c2\"><\u002Fscript>\n<style>\n  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }\n  html, body { margin: 0; padding: 0; }\n  body { font-family: \"Helvetica Neue\", Helvetica, system-ui, -apple-system, sans-serif; background: #0d0f12; }\n  @keyframes scanline { 0% { top: 4%; } 50% { top: 92%; } 100% { top: 4%; } }\n  @keyframes flashpulse { 0% { opacity: 0; } 20% { opacity: 0.55; } 100% { opacity: 0; } }\n  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }\n  a { color: oklch(0.78 0.13 165); }\n  a:hover { color: oklch(0.85 0.13 165); }\n  ::-webkit-scrollbar { width: 0; height: 0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height: 100dvh; background: #0d0f12; color: #e8eaed; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; position: relative;\">\n\n  <header style=\"display: flex; align-items: center; gap: 10px; padding: 16px 18px calc(14px + env(safe-area-inset-top)); padding-top: calc(16px + env(safe-area-inset-top)); border-bottom: 1px solid #1c2026; position: sticky; top: 0; background: rgba(13,15,18,0.92); backdrop-filter: blur(8px); z-index: 10;\">\n    <div style=\"width: 30px; height: 30px; border-radius: 8px; background: oklch(0.72 0.14 165); display: flex; align-items: center; justify-content: center; flex-shrink: 0;\">\n      <div style=\"width: 14px; height: 14px; border: 2.5px solid #0d0f12; border-radius: 3px;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex: 1;\">\n      <div style=\"font-size: 16px; font-weight: 700; letter-spacing: -0.01em;\">Centralux QR<\u002Fdiv>\n      <div style=\"font-size: 11px; color: #6b7280; letter-spacing: 0.02em;\">Leitor de QR Code<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size: 12px; color: #9aa0a6; font-variant-numeric: tabular-nums; background: #16191e; padding: 5px 10px; border-radius: 999px;\">{{ count }} lidos<\u002Fdiv>\n  <\u002Fheader>\n\n  <div style=\"padding: 16px 16px 0;\">\n    <div style=\"position: relative; width: 100%; aspect-ratio: 1 / 1; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid #23272e;\">\n      <video ref=\"{{ videoRef }}\" playsinline=\"\" muted=\"\" autoplay=\"\" style=\"width: 100%; height: 100%; object-fit: cover; display: block;\"><\u002Fvideo>\n      <canvas ref=\"{{ canvasRef }}\" style=\"display: none;\"><\u002Fcanvas>\n\n      <sc-if value=\"{{ scanning }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position: absolute; inset: 0; pointer-events: none;\">\n          <div style=\"position: absolute; top: 12%; left: 12%; right: 12%; bottom: 12%;\">\n            <div style=\"position: absolute; top: 0; left: 0; width: 30px; height: 30px; border-top: 3px solid oklch(0.78 0.14 165); border-left: 3px solid oklch(0.78 0.14 165); border-top-left-radius: 8px;\"><\u002Fdiv>\n            <div style=\"position: absolute; top: 0; right: 0; width: 30px; height: 30px; border-top: 3px solid oklch(0.78 0.14 165); border-right: 3px solid oklch(0.78 0.14 165); border-top-right-radius: 8px;\"><\u002Fdiv>\n            <div style=\"position: absolute; bottom: 0; left: 0; width: 30px; height: 30px; border-bottom: 3px solid oklch(0.78 0.14 165); border-left: 3px solid oklch(0.78 0.14 165); border-bottom-left-radius: 8px;\"><\u002Fdiv>\n            <div style=\"position: absolute; bottom: 0; right: 0; width: 30px; height: 30px; border-bottom: 3px solid oklch(0.78 0.14 165); border-right: 3px solid oklch(0.78 0.14 165); border-bottom-right-radius: 8px;\"><\u002Fdiv>\n            <div style=\"position: absolute; left: 0; right: 0; height: 2px; background: oklch(0.82 0.15 165); box-shadow: 0 0 12px oklch(0.78 0.14 165); animation: scanline 2.6s ease-in-out infinite;\"><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <div ref=\"{{ flashRef }}\" style=\"position: absolute; inset: 0; background: oklch(0.82 0.15 165); opacity: 0; pointer-events: none;\"><\u002Fdiv>\n\n      <sc-if value=\"{{ hasError }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; padding: 28px; text-align: center; background: #0d0f12;\">\n          <div style=\"font-size: 13px; color: #c4c9cf; line-height: 1.5;\">{{ error }}<\u002Fdiv>\n          <button onclick=\"{{ startCamera }}\" style=\"font: inherit; font-size: 14px; font-weight: 600; color: #0d0f12; background: oklch(0.78 0.14 165); border: none; padding: 11px 20px; border-radius: 10px; cursor: pointer;\">Ativar câmera<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ idle }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 28px; text-align: center; background: #0d0f12;\">\n          <div style=\"font-size: 14px; color: #9aa0a6; line-height: 1.5;\">Toque para abrir a câmera<br>e escanear QR Codes<\u002Fdiv>\n          <button onclick=\"{{ startCamera }}\" style=\"font: inherit; font-size: 15px; font-weight: 600; color: #0d0f12; background: oklch(0.78 0.14 165); border: none; padding: 13px 26px; border-radius: 12px; cursor: pointer;\">Iniciar leitura<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ lastValue }}\" hint-placeholder-val=\"\">\n      <div style=\"margin-top: 12px; display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: oklch(0.28 0.05 165); border: 1px solid oklch(0.4 0.08 165); border-radius: 12px; animation: slidein 0.25s ease;\">\n        <div style=\"width: 8px; height: 8px; border-radius: 999px; background: oklch(0.82 0.15 165); flex-shrink: 0;\"><\u002Fdiv>\n        <div style=\"flex: 1; min-width: 0;\">\n          <div style=\"font-size: 10px; color: oklch(0.82 0.1 165); text-transform: uppercase; letter-spacing: 0.06em;\">Último lido<\u002Fdiv>\n          <div style=\"font-size: 13px; color: #e8eaed; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;\">{{ lastValue }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <div style=\"padding: 18px 16px 8px; display: flex; align-items: baseline; justify-content: space-between;\">\n    <div style=\"font-size: 14px; font-weight: 700; letter-spacing: -0.01em;\">Histórico<\u002Fdiv>\n    <div style=\"font-size: 12px; color: #6b7280;\">{{ count }} itens<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"flex: 1; padding: 0 16px; display: flex; flex-direction: column; gap: 8px;\">\n    <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"padding: 40px 20px; text-align: center; color: #4b5563; font-size: 13px; border: 1px dashed #23272e; border-radius: 14px;\">Nenhum QR Code lido ainda.<\u002Fdiv>\n    <\u002Fsc-if>\n    <sc-for list=\"{{ items }}\" as=\"item\" hint-placeholder-count=\"0\">\n      <div style=\"display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #14171c; border: 1px solid #1e222a; border-radius: 12px;\">\n        <div style=\"font-size: 11px; color: #565c66; font-variant-numeric: tabular-nums; width: 22px; text-align: right; flex-shrink: 0;\">{{ item.n }}<\u002Fdiv>\n        <div style=\"flex: 1; min-width: 0;\">\n          <div style=\"font-size: 13.5px; color: #e8eaed; word-break: break-all; line-height: 1.35;\">{{ item.value }}<\u002Fdiv>\n          <div style=\"font-size: 11px; color: #6b7280; margin-top: 2px;\">{{ item.time }}<\u002Fdiv>\n        <\u002Fdiv>\n        <button onclick=\"{{ item.copy }}\" title=\"Copiar\" style=\"font: inherit; font-size: 11px; color: #9aa0a6; background: #1c2027; border: 1px solid #262b33; padding: 6px 10px; border-radius: 8px; cursor: pointer; flex-shrink: 0;\">Copiar<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <div style=\"position: sticky; bottom: 0; margin-top: 16px; padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); background: rgba(13,15,18,0.94); backdrop-filter: blur(8px); border-top: 1px solid #1c2026; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;\">\n    <button onclick=\"{{ exportTxt }}\" disabled=\"{{ isEmpty }}\" style=\"font: inherit; font-size: 12.5px; font-weight: 600; color: #e8eaed; background: #1c2027; border: 1px solid #262b33; padding: 12px 6px; border-radius: 11px; cursor: pointer; opacity: {{ btnOpacity }};\">Exportar TXT<\u002Fbutton>\n    <button onclick=\"{{ exportCsv }}\" disabled=\"{{ isEmpty }}\" style=\"font: inherit; font-size: 12.5px; font-weight: 600; color: #e8eaed; background: #1c2027; border: 1px solid #262b33; padding: 12px 6px; border-radius: 11px; cursor: pointer; opacity: {{ btnOpacity }};\">Exportar CSV<\u002Fbutton>\n    <button onclick=\"{{ clearAll }}\" disabled=\"{{ isEmpty }}\" style=\"font: inherit; font-size: 12.5px; font-weight: 600; color: oklch(0.72 0.15 25); background: #211619; border: 1px solid oklch(0.35 0.08 25); padding: 12px 6px; border-radius: 11px; cursor: pointer; opacity: {{ btnOpacity }};\">Limpar<\u002Fbutton>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { items: [], status: \"idle\", error: \"\", lastValue: \"\" };\n\n  constructor(props) {\n    super(props);\n    this.videoRef = React.createRef();\n    this.canvasRef = React.createRef();\n    this.flashRef = React.createRef();\n    this._raf = null;\n    this._stream = null;\n    this._lastDetectAt = 0;\n    this._lastDetectVal = \"\";\n  }\n\n  componentDidMount() {\n    try {\n      const saved = JSON.parse(localStorage.getItem(\"centralux_qr_items\") || \"[]\");\n      if (Array.isArray(saved)) this.setState({ items: saved });\n    } catch (e) {}\n  }\n\n  componentWillUnmount() {\n    this._stopCamera();\n  }\n\n  _persist(items) {\n    try { localStorage.setItem(\"centralux_qr_items\", JSON.stringify(items)); } catch (e) {}\n  }\n\n  _stopCamera() {\n    if (this._raf) cancelAnimationFrame(this._raf);\n    this._raf = null;\n    if (this._stream) {\n      this._stream.getTracks().forEach(t => t.stop());\n      this._stream = null;\n    }\n  }\n\n  startCamera = async () => {\n    this._stopCamera();\n    this.setState({ status: \"starting\", error: \"\" });\n    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {\n      this.setState({ status: \"error\", error: \"Câmera não suportada neste navegador.\" });\n      return;\n    }\n    try {\n      let stream;\n      try {\n        stream = await navigator.mediaDevices.getUserMedia({\n          video: { facingMode: { exact: \"environment\" } }, audio: false\n        });\n      } catch (e) {\n        stream = await navigator.mediaDevices.getUserMedia({\n          video: { facingMode: \"environment\" }, audio: false\n        });\n      }\n      this._stream = stream;\n      const video = this.videoRef.current;\n      if (!video) return;\n      video.srcObject = stream;\n      video.setAttribute(\"playsinline\", \"true\");\n      await video.play();\n      this.setState({ status: \"scanning\" });\n      this._tick();\n    } catch (err) {\n      let msg = \"Não foi possível acessar a câmera.\";\n      if (err && (err.name === \"NotAllowedError\" || err.name === \"SecurityError\"))\n        msg = \"Permissão da câmera negada. Habilite o acesso à câmera nas configurações e tente novamente.\";\n      else if (err && err.name === \"NotFoundError\")\n        msg = \"Nenhuma câmera encontrada no aparelho.\";\n      this.setState({ status: \"error\", error: msg });\n    }\n  };\n\n  _tick = () => {\n    this._raf = requestAnimationFrame(this._tick);\n    const video = this.videoRef.current;\n    const canvas = this.canvasRef.current;\n    if (!video || !canvas || video.readyState !== video.HAVE_ENOUGH_DATA) return;\n    if (typeof window.jsQR !== \"function\") return;\n\n    const w = video.videoWidth, h = video.videoHeight;\n    if (!w || !h) return;\n    canvas.width = w; canvas.height = h;\n    const ctx = canvas.getContext(\"2d\", { willReadFrequently: true });\n    ctx.drawImage(video, 0, 0, w, h);\n    let imageData;\n    try { imageData = ctx.getImageData(0, 0, w, h); } catch (e) { return; }\n    const code = window.jsQR(imageData.data, w, h, { inversionAttempts: \"dontInvert\" });\n    if (code && code.data) this._onDetect(code.data);\n  };\n\n  _onDetect(value) {\n    const now = Date.now();\n    // debounce identical scans within 2.5s\n    if (value === this._lastDetectVal && now - this._lastDetectAt < 2500) return;\n    this._lastDetectVal = value;\n    this._lastDetectAt = now;\n\n    const d = new Date();\n    const pad = n => String(n).padStart(2, \"0\");\n    const time = `${pad(d.getDate())}/${pad(d.getMonth() + 1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;\n    const entry = { value, time, ts: now };\n\n    this.setState(s => {\n      const items = [entry, ...s.items];\n      this._persist(items);\n      return { items, lastValue: value };\n    });\n\n    // visual flash\n    const flash = this.flashRef.current;\n    if (flash) {\n      flash.style.animation = \"none\";\n      void flash.offsetWidth;\n      flash.style.animation = \"flashpulse 0.5s ease\";\n    }\n    if (navigator.vibrate) navigator.vibrate(60);\n  }\n\n  _download(filename, text, mime) {\n    const blob = new Blob([text], { type: mime });\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url; a.download = filename;\n    document.body.appendChild(a); a.click();\n    document.body.removeChild(a);\n    setTimeout(() => URL.revokeObjectURL(url), 1000);\n  }\n\n  exportTxt = () => {\n    if (!this.state.items.length) return;\n    const lines = this.state.items.slice().reverse()\n      .map((it, i) => `${i + 1}. [${it.time}] ${it.value}`);\n    this._download(`centralux-qr-${this._stamp()}.txt`, lines.join(\"\\n\"), \"text/plain;charset=utf-8\");\n  };\n\n  exportCsv = () => {\n    if (!this.state.items.length) return;\n    const esc = v => `\"${String(v).replace(/\"/g, '\"\"')}\"`;\n    const rows = [[\"indice\", \"valor\", \"data_hora\"]];\n    this.state.items.slice().reverse().forEach((it, i) => rows.push([i + 1, it.value, it.time]));\n    const csv = \"\\uFEFF\" + rows.map(r => r.map(esc).join(\",\")).join(\"\\r\\n\");\n    this._download(`centralux-qr-${this._stamp()}.csv`, csv, \"text/csv;charset=utf-8\");\n  };\n\n  _stamp() {\n    const d = new Date();\n    const pad = n => String(n).padStart(2, \"0\");\n    return `${d.getFullYear()}${pad(d.getMonth() + 1)}${pad(d.getDate())}-${pad(d.getHours())}${pad(d.getMinutes())}`;\n  }\n\n  clearAll = () => {\n    if (!this.state.items.length) return;\n    if (!window.confirm(\"Limpar todo o histórico de leituras?\")) return;\n    this._persist([]);\n    this.setState({ items: [], lastValue: \"\" });\n  };\n\n  _copy(value) {\n    if (navigator.clipboard && navigator.clipboard.writeText) {\n      navigator.clipboard.writeText(value).catch(() => {});\n    }\n  }\n\n  renderVals() {\n    const items = this.state.items;\n    const isEmpty = items.length === 0;\n    return {\n      videoRef: this.videoRef,\n      canvasRef: this.canvasRef,\n      flashRef: this.flashRef,\n      count: items.length,\n      isEmpty,\n      scanning: this.state.status === \"scanning\",\n      idle: this.state.status === \"idle\" || this.state.status === \"starting\",\n      hasError: this.state.status === \"error\",\n      error: this.state.error,\n      lastValue: this.state.lastValue,\n      startCamera: this.startCamera,\n      exportTxt: this.exportTxt,\n      exportCsv: this.exportCsv,\n      clearAll: this.clearAll,\n      btnOpacity: isEmpty ? 0.4 : 1,\n      items: items.map((it, i) => ({\n        n: items.length - i,\n        value: it.value,\n        time: it.time,\n        copy: () => this._copy(it.value)\n      }))\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
