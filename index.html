<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Centralux QR</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body { font-family: "Helvetica Neue", Helvetica, system-ui, -apple-system, sans-serif; background: #0d0f12; color: #e8eaed; }
  @keyframes scanline { 0% { top: 4%; } 50% { top: 92%; } 100% { top: 4%; } }
  @keyframes flashpulse { 0% { opacity: 0; } 20% { opacity: 0.55; } 100% { opacity: 0; } }
  @keyframes slidein { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  ::-webkit-scrollbar { width: 0; height: 0; }
  button { font: inherit; }

  .app { min-height: 100dvh; display: flex; flex-direction: column; max-width: 520px; margin: 0 auto; position: relative; }

  header { display: flex; align-items: center; gap: 10px; padding: calc(16px + env(safe-area-inset-top)) 18px 14px; border-bottom: 1px solid #1c2026; position: sticky; top: 0; background: rgba(13,15,18,0.92); backdrop-filter: blur(8px); z-index: 10; }
  .logo { width: 30px; height: 30px; border-radius: 8px; background: oklch(0.72 0.14 165); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo div { width: 14px; height: 14px; border: 2.5px solid #0d0f12; border-radius: 3px; }
  .title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
  .subtitle { font-size: 11px; color: #6b7280; letter-spacing: 0.02em; }
  .counter { font-size: 12px; color: #9aa0a6; font-variant-numeric: tabular-nums; background: #16191e; padding: 5px 10px; border-radius: 999px; }

  .cam-wrap { padding: 16px 16px 0; }
  .cam { position: relative; width: 100%; aspect-ratio: 1 / 1; background: #000; border-radius: 18px; overflow: hidden; border: 1px solid #23272e; }
  .cam video { width: 100%; height: 100%; object-fit: cover; display: block; }

  .corners { position: absolute; inset: 0; pointer-events: none; }
  .corners .frame { position: absolute; top: 12%; left: 12%; right: 12%; bottom: 12%; }
  .corners .c { position: absolute; width: 30px; height: 30px; }
  .corners .tl { top: 0; left: 0; border-top: 3px solid oklch(0.78 0.14 165); border-left: 3px solid oklch(0.78 0.14 165); border-top-left-radius: 8px; }
  .corners .tr { top: 0; right: 0; border-top: 3px solid oklch(0.78 0.14 165); border-right: 3px solid oklch(0.78 0.14 165); border-top-right-radius: 8px; }
  .corners .bl { bottom: 0; left: 0; border-bottom: 3px solid oklch(0.78 0.14 165); border-left: 3px solid oklch(0.78 0.14 165); border-bottom-left-radius: 8px; }
  .corners .br { bottom: 0; right: 0; border-bottom: 3px solid oklch(0.78 0.14 165); border-right: 3px solid oklch(0.78 0.14 165); border-bottom-right-radius: 8px; }
  .corners .line { position: absolute; left: 0; right: 0; height: 2px; background: oklch(0.82 0.15 165); box-shadow: 0 0 12px oklch(0.78 0.14 165); animation: scanline 2.6s ease-in-out infinite; }

  .flash { position: absolute; inset: 0; background: oklch(0.82 0.15 165); opacity: 0; pointer-events: none; }

  .overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; padding: 28px; text-align: center; background: #0d0f12; }
  .overlay .msg { font-size: 14px; color: #9aa0a6; line-height: 1.5; }
  .overlay .msg-err { font-size: 13px; color: #c4c9cf; line-height: 1.5; }
  .btn-primary { font-size: 15px; font-weight: 600; color: #0d0f12; background: oklch(0.78 0.14 165); border: none; padding: 13px 26px; border-radius: 12px; cursor: pointer; }

  .controls { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; background: #14171c; border: 1px solid #1e222a; border-radius: 12px; padding: 5px; }
  .seg button { font-size: 13px; font-weight: 600; padding: 10px 8px; border-radius: 9px; border: none; cursor: pointer; background: transparent; color: #9aa0a6; transition: background 0.15s, color 0.15s; }
  .seg button.active { background: oklch(0.72 0.14 165); color: #0d0f12; }

  .norepeat { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: #14171c; border: 1px solid #1e222a; border-radius: 12px; cursor: pointer; user-select: none; }
  .norepeat input { width: 18px; height: 18px; accent-color: oklch(0.72 0.14 165); cursor: pointer; flex-shrink: 0; margin: 0; }
  .norepeat span { font-size: 13px; color: #c4c9cf; }

  .lastread { margin-top: 12px; display: none; align-items: center; gap: 10px; padding: 12px 14px; background: oklch(0.28 0.05 165); border: 1px solid oklch(0.4 0.08 165); border-radius: 12px; animation: slidein 0.25s ease; }
  .lastread.show { display: flex; }
  .lastread .dot { width: 8px; height: 8px; border-radius: 999px; background: oklch(0.82 0.15 165); flex-shrink: 0; }
  .lastread .label { font-size: 10px; color: oklch(0.82 0.1 165); text-transform: uppercase; letter-spacing: 0.06em; }
  .lastread .value { font-size: 13px; color: #e8eaed; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .dupmsg { margin-top: 10px; display: none; align-items: center; gap: 10px; padding: 10px 14px; background: #241d10; border: 1px solid #4a3a15; border-radius: 12px; animation: slidein 0.25s ease; font-size: 12.5px; color: #e0b95c; }
  .dupmsg.show { display: flex; }

  .hist-head { padding: 18px 16px 8px; display: flex; align-items: baseline; justify-content: space-between; }
  .hist-head .t { font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .hist-head .c { font-size: 12px; color: #6b7280; }

  .hist { flex: 1; padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
  .empty { padding: 40px 20px; text-align: center; color: #4b5563; font-size: 13px; border: 1px dashed #23272e; border-radius: 14px; }
  .item { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: #14171c; border: 1px solid #1e222a; border-radius: 12px; }
  .item .n { font-size: 11px; color: #565c66; font-variant-numeric: tabular-nums; width: 22px; text-align: right; flex-shrink: 0; }
  .item .body { flex: 1; min-width: 0; }
  .item .val { font-size: 13.5px; color: #e8eaed; word-break: break-all; line-height: 1.35; }
  .item .meta { font-size: 11px; color: #6b7280; margin-top: 2px; display: flex; align-items: center; gap: 6px; }
  .badge { font-size: 9.5px; font-weight: 700; letter-spacing: 0.04em; padding: 1.5px 6px; border-radius: 5px; text-transform: uppercase; }
  .badge.qr { background: oklch(0.3 0.06 165); color: oklch(0.82 0.12 165); }
  .badge.barra { background: #2a2033; color: #c8a4f0; }
  .bigcounter { margin-top: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; padding: 16px 14px; background: oklch(0.22 0.04 165); border: 2px solid oklch(0.45 0.09 165); border-radius: 16px; }
  .bigcounter .label { font-size: 11px; font-weight: 700; color: oklch(0.75 0.1 165); text-transform: uppercase; letter-spacing: 0.12em; }
  .bigcounter .num { font-size: 52px; font-weight: 800; color: oklch(0.85 0.15 165); font-variant-numeric: tabular-nums; line-height: 1.1; text-shadow: 0 0 24px oklch(0.6 0.14 165 / 0.5); }
  @keyframes countpop { 0% { transform: scale(1); } 40% { transform: scale(1.18); } 100% { transform: scale(1); } }
  .bigcounter .num.pop { animation: countpop 0.3s ease; }
  .item .copy { font-size: 11px; color: #9aa0a6; background: #1c2027; border: 1px solid #262b33; padding: 6px 10px; border-radius: 8px; cursor: pointer; flex-shrink: 0; }

  .footer { position: sticky; bottom: 0; margin-top: 16px; padding: 12px 16px calc(14px + env(safe-area-inset-bottom)); background: rgba(13,15,18,0.94); backdrop-filter: blur(8px); border-top: 1px solid #1c2026; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .footer button { font-size: 12.5px; font-weight: 600; color: #e8eaed; background: #1c2027; border: 1px solid #262b33; padding: 12px 6px; border-radius: 11px; cursor: pointer; }
  .footer button:disabled { opacity: 0.4; cursor: default; }
  .footer .danger { color: oklch(0.72 0.15 25); background: #211619; border: 1px solid oklch(0.35 0.08 25); }
  .footer .whats { color: #0d0f12; background: #25d366; border: 1px solid #1eab52; display: inline-flex; align-items: center; justify-content: center; gap: 6px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo"><div></div></div>
    <div style="flex:1;">
      <div class="title">Centralux QR</div>
      <div class="subtitle" id="subtitle">Leitor de QR Code e Código de Barras</div>
    </div>
    <div class="counter"><span id="countTop">0</span> lidos</div>
  </header>

  <div class="cam-wrap">
    <div class="cam">
      <video id="video" playsinline muted autoplay></video>
      <canvas id="canvas" style="display:none;"></canvas>

      <div class="corners" id="scanOverlay" style="display:none;">
        <div class="frame">
          <div class="c tl"></div><div class="c tr"></div><div class="c bl"></div><div class="c br"></div>
          <div class="line"></div>
        </div>
      </div>

      <div class="flash" id="flash"></div>

      <div class="overlay" id="idleOverlay">
        <div class="msg">Toque para abrir a câmera<br>e escanear códigos</div>
        <button class="btn-primary" id="btnStart">Iniciar leitura</button>
      </div>

      <div class="overlay" id="errorOverlay" style="display:none;">
        <div class="msg-err" id="errorMsg"></div>
        <button class="btn-primary" id="btnRetry">Ativar câmera</button>
      </div>
    </div>

    <div class="controls">
      <div class="seg">
        <button id="modeQr" class="active">QR Code</button>
        <button id="modeBar">Código de Barras</button>
      </div>
      <label class="norepeat">
        <input type="checkbox" id="noRepeat">
        <span>Não repetir códigos na listagem</span>
      </label>
      <label class="norepeat">
        <input type="checkbox" id="beepOn">
        <span>Bip sonoro ao ler código</span>
      </label>
    </div>

    <div class="bigcounter">
      <div class="label">Códigos registrados</div>
      <div class="num" id="bigCount">0</div>
    </div>

    <div class="lastread" id="lastRead">
      <div class="dot"></div>
      <div style="flex:1; min-width:0;">
        <div class="label">Último lido</div>
        <div class="value" id="lastValue"></div>
      </div>
    </div>

    <div class="dupmsg" id="dupMsg">⚠ Código já registrado — leitura ignorada.</div>
  </div>

  <div class="hist-head">
    <div class="t">Histórico</div>
    <div class="c"><span id="countList">0</span> itens</div>
  </div>

  <div class="hist" id="hist">
    <div class="empty" id="empty">Nenhum código lido ainda.</div>
  </div>

  <div class="footer">
    <button id="btnTxt" disabled>Exportar TXT</button>
    <button id="btnWhats" class="whats" disabled>
      <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="flex-shrink:0;"><path d="M12.04 2c-5.46 0-9.9 4.44-9.9 9.9 0 1.75.46 3.45 1.32 4.95L2 22l5.3-1.39c1.45.79 3.08 1.21 4.74 1.21 5.46 0 9.9-4.44 9.9-9.9 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0 0 12.04 2m0 1.67c2.2 0 4.26.86 5.82 2.42a8.18 8.18 0 0 1 2.41 5.83c0 4.54-3.7 8.23-8.24 8.23-1.48 0-2.93-.39-4.19-1.15l-.3-.17-3.12.82.83-3.04-.2-.32a8.19 8.19 0 0 1-1.26-4.38c.01-4.54 3.7-8.24 8.25-8.24M8.53 7.33c-.16 0-.43.06-.66.31-.22.25-.87.86-.87 2.07 0 1.22.89 2.39 1 2.56.14.17 1.76 2.67 4.25 3.73.59.27 1.05.42 1.41.53.59.19 1.13.16 1.56.1.48-.07 1.46-.6 1.67-1.18.21-.58.21-1.07.15-1.18-.07-.1-.23-.16-.48-.27-.25-.14-1.47-.74-1.69-.82-.23-.08-.37-.12-.56.12-.16.25-.64.81-.78.97-.15.17-.29.19-.53.07-.26-.13-1.06-.39-2-1.23-.74-.66-1.23-1.47-1.38-1.72-.12-.24-.01-.39.11-.5.11-.11.27-.29.37-.44.13-.14.17-.25.25-.41.08-.17.04-.31-.02-.43-.06-.11-.56-1.35-.77-1.84-.2-.48-.4-.42-.56-.43-.14 0-.3-.01-.47-.01"/></svg>
      WhatsApp
    </button>
    <button id="btnClear" class="danger" disabled>Resetar tudo</button>
  </div>

</div>

<script>
(function () {
  "use strict";

  var LS_ITEMS = "centralux_qr_items";
  var LS_MODE = "centralux_qr_mode";
  var LS_NOREPEAT = "centralux_qr_norepeat";
  var LS_BEEP = "centralux_qr_beep";

  var items = [];
  var mode = "qr";            // "qr" | "barra"
  var noRepeat = false;
  var beepOn = false;
  var audioCtx = null;
  var stream = null;
  var raf = null;
  var lastDetectVal = "";
  var lastDetectAt = 0;
  var lastBarcodeDecode = 0;
  var dupTimer = null;

  // ZXing setup (leitura de código de barras)
  var zxingReader = null;
  function getZxingReader() {
    if (zxingReader || typeof ZXing === "undefined") return zxingReader;
    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
      ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
      ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.CODE_93, ZXing.BarcodeFormat.ITF,
      ZXing.BarcodeFormat.CODABAR
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
    zxingReader = new ZXing.MultiFormatReader();
    zxingReader.setHints(hints);
    return zxingReader;
  }

  // Elementos
  var $ = function (id) { return document.getElementById(id); };
  var video = $("video"), canvas = $("canvas"), flash = $("flash");
  var idleOverlay = $("idleOverlay"), errorOverlay = $("errorOverlay"), errorMsg = $("errorMsg");
  var scanOverlay = $("scanOverlay");
  var lastRead = $("lastRead"), lastValueEl = $("lastValue"), dupMsg = $("dupMsg");
  var histEl = $("hist"), emptyEl = $("empty");
  var countTop = $("countTop"), countList = $("countList");
  var bigCount = $("bigCount");
  var btnTxt = $("btnTxt"), btnWhats = $("btnWhats"), btnClear = $("btnClear");
  var modeQrBtn = $("modeQr"), modeBarBtn = $("modeBar");
  var noRepeatCb = $("noRepeat");
  var beepCb = $("beepOn");
  var subtitle = $("subtitle");

  // Persistência
  function loadState() {
    try {
      var saved = JSON.parse(localStorage.getItem(LS_ITEMS) || "[]");
      if (Array.isArray(saved)) items = saved;
    } catch (e) {}
    mode = localStorage.getItem(LS_MODE) === "barra" ? "barra" : "qr";
    noRepeat = localStorage.getItem(LS_NOREPEAT) === "1";
    beepOn = localStorage.getItem(LS_BEEP) === "1";
  }
  function persistItems() {
    try { localStorage.setItem(LS_ITEMS, JSON.stringify(items)); } catch (e) {}
  }

  // UI
  function applyModeUI() {
    modeQrBtn.classList.toggle("active", mode === "qr");
    modeBarBtn.classList.toggle("active", mode === "barra");
    subtitle.textContent = mode === "qr" ? "Leitor de QR Code" : "Leitor de Código de Barras";
  }

  function renderList() {
    countTop.textContent = items.length;
    countList.textContent = items.length;
    bigCount.textContent = items.length;
    var isEmpty = items.length === 0;
    btnTxt.disabled = isEmpty;
    btnWhats.disabled = isEmpty;
    btnClear.disabled = isEmpty;

    // limpa lista (mantém o placeholder de vazio)
    var nodes = histEl.querySelectorAll(".item");
    for (var i = 0; i < nodes.length; i++) nodes[i].remove();
    emptyEl.style.display = isEmpty ? "" : "none";

    items.forEach(function (it, idx) {
      var div = document.createElement("div");
      div.className = "item";

      var n = document.createElement("div");
      n.className = "n";
      n.textContent = items.length - idx;

      var body = document.createElement("div");
      body.className = "body";
      var val = document.createElement("div");
      val.className = "val";
      val.textContent = it.value;
      var meta = document.createElement("div");
      meta.className = "meta";
      var badge = document.createElement("span");
      var t = it.type === "barra" ? "barra" : "qr";
      badge.className = "badge " + t;
      badge.textContent = t === "barra" ? "Barras" : "QR";
      var time = document.createElement("span");
      time.textContent = it.time;
      meta.appendChild(badge);
      meta.appendChild(time);
      body.appendChild(val);
      body.appendChild(meta);

      var copy = document.createElement("button");
      copy.className = "copy";
      copy.textContent = "Copiar";
      copy.addEventListener("click", function () {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(it.value).catch(function () {});
          copy.textContent = "Copiado!";
          setTimeout(function () { copy.textContent = "Copiar"; }, 1200);
        }
      });

      div.appendChild(n);
      div.appendChild(body);
      div.appendChild(copy);
      histEl.appendChild(div);
    });
  }

  function ensureAudio() {
    if (!audioCtx) {
      var AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audioCtx = new AC();
    }
    if (audioCtx.state === "suspended") audioCtx.resume();
    return audioCtx;
  }

  function playBeep(kind) {
    if (!beepOn) return;
    var ctx = ensureAudio();
    if (!ctx) return;
    var t = ctx.currentTime;
    function tone(freq, start, dur, vol) {
      var osc = ctx.createOscillator();
      var gain = ctx.createGain();
      osc.type = "square";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.0001, t + start);
      gain.gain.exponentialRampToValueAtTime(vol, t + start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + start + dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t + start); osc.stop(t + start + dur + 0.02);
    }
    if (kind === "dup") {
      // duplicado ignorado: dois tons graves
      tone(320, 0, 0.10, 0.25);
      tone(320, 0.14, 0.10, 0.25);
    } else {
      // leitura registrada: bip agudo curto
      tone(1400, 0, 0.09, 0.3);
    }
  }

  function showDupMsg() {
    dupMsg.classList.add("show");
    if (dupTimer) clearTimeout(dupTimer);
    dupTimer = setTimeout(function () { dupMsg.classList.remove("show"); }, 2000);
  }

  // Câmera
  function stopCamera() {
    if (raf) cancelAnimationFrame(raf);
    raf = null;
    if (stream) {
      stream.getTracks().forEach(function (t) { t.stop(); });
      stream = null;
    }
  }

  function startCamera() {
    stopCamera();
    idleOverlay.style.display = "none";
    errorOverlay.style.display = "none";

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      showError("Câmera não suportada neste navegador.");
      return;
    }
    navigator.mediaDevices.getUserMedia({ video: { facingMode: { exact: "environment" } }, audio: false })
      .catch(function () {
        return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
      })
      .then(function (s) {
        stream = s;
        video.srcObject = s;
        video.setAttribute("playsinline", "true");
        return video.play();
      })
      .then(function () {
        scanOverlay.style.display = "";
        tick();
      })
      .catch(function (err) {
        var msg = "Não foi possível acessar a câmera.";
        if (err && (err.name === "NotAllowedError" || err.name === "SecurityError"))
          msg = "Permissão da câmera negada. Habilite o acesso à câmera nas configurações e tente novamente.";
        else if (err && err.name === "NotFoundError")
          msg = "Nenhuma câmera encontrada no aparelho.";
        showError(msg);
      });
  }

  function showError(msg) {
    scanOverlay.style.display = "none";
    errorMsg.textContent = msg;
    errorOverlay.style.display = "";
  }

  // Loop de leitura
  function tick() {
    raf = requestAnimationFrame(tick);
    if (!video || video.readyState !== video.HAVE_ENOUGH_DATA) return;
    var w = video.videoWidth, h = video.videoHeight;
    if (!w || !h) return;
    canvas.width = w; canvas.height = h;
    var ctx = canvas.getContext("2d", { willReadFrequently: true });
    ctx.drawImage(video, 0, 0, w, h);

    if (mode === "qr") {
      if (typeof window.jsQR !== "function") return;
      var imageData;
      try { imageData = ctx.getImageData(0, 0, w, h); } catch (e) { return; }
      var code = window.jsQR(imageData.data, w, h, { inversionAttempts: "dontInvert" });
      if (code && code.data) onDetect(code.data, "qr");
    } else {
      // ZXing é mais pesado: decodifica a cada ~180ms
      var now = Date.now();
      if (now - lastBarcodeDecode < 180) return;
      lastBarcodeDecode = now;
      var reader = getZxingReader();
      if (!reader) return;
      try {
        var source = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
        var bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(source));
        var result = reader.decode(bitmap);
        if (result && result.getText()) onDetect(result.getText(), "barra");
      } catch (e) {
        // NotFoundException: nenhum código no frame — normal
      } finally {
        try { reader.reset(); } catch (e) {}
      }
    }
  }

  function onDetect(value, type) {
    var now = Date.now();
    // debounce de leituras idênticas em 2,5s
    if (value === lastDetectVal && now - lastDetectAt < 2500) return;
    lastDetectVal = value;
    lastDetectAt = now;

    // checkbox: não repetir códigos -> registra apenas UMA vez, ignora repetidas
    if (noRepeat) {
      var exists = items.some(function (it) { return it.value === value; });
      if (exists) {
        showDupMsg();
        playBeep("dup");
        if (navigator.vibrate) navigator.vibrate([40, 60, 40]);
        return;
      }
    }

    var d = new Date();
    var pad = function (n) { return String(n).padStart(2, "0"); };
    var time = pad(d.getDate()) + "/" + pad(d.getMonth() + 1) + "/" + d.getFullYear() + " " +
               pad(d.getHours()) + ":" + pad(d.getMinutes()) + ":" + pad(d.getSeconds());

    items.unshift({ value: value, time: time, ts: now, type: type });
    persistItems();

    lastValueEl.textContent = value;
    lastRead.classList.add("show");
    renderList();

    // anima o contador grande
    bigCount.classList.remove("pop");
    void bigCount.offsetWidth;
    bigCount.classList.add("pop");

    flash.style.animation = "none";
    void flash.offsetWidth;
    flash.style.animation = "flashpulse 0.5s ease";
    playBeep("ok");
    if (navigator.vibrate) navigator.vibrate(60);
  }

  // Exportação
  function download(filename, text, mimeType) {
    var blob = new Blob([text], { type: mimeType });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  }
  function stamp() {
    var d = new Date();
    var pad = function (n) { return String(n).padStart(2, "0"); };
    return "" + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + "-" + pad(d.getHours()) + pad(d.getMinutes());
  }

  btnTxt.addEventListener("click", function () {
    if (!items.length) return;
    var lines = items.slice().reverse().map(function (it, i) {
      return (i + 1) + ". [" + it.time + "] " + it.value;
    });
    download("centralux-qr-" + stamp() + ".txt", lines.join("\n"), "text/plain;charset=utf-8");
  });

  function buildReport() {
    var d = new Date();
    var pad = function (n) { return String(n).padStart(2, "0"); };
    var header = "*Relat\u00F3rio Centralux QR*\n" +
      "Gerado em " + pad(d.getDate()) + "/" + pad(d.getMonth() + 1) + "/" + d.getFullYear() +
      " \u00E0s " + pad(d.getHours()) + ":" + pad(d.getMinutes()) + "\n" +
      "Total de c\u00F3digos: *" + items.length + "*\n\n";
    var lines = items.slice().reverse().map(function (it, i) {
      var tipo = it.type === "barra" ? "Barras" : "QR";
      return (i + 1) + ". " + it.value + "\n   (" + tipo + " \u2014 " + it.time + ")";
    });
    return header + lines.join("\n");
  }
